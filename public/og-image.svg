<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a1e3d"/>
  <!-- Dot grid texture -->
  <pattern id="dots" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.07)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Gradient orb top-right -->
  <radialGradient id="orb" cx="85%" cy="20%" r="40%">
    <stop offset="0%" stop-color="#2451a0" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#0a1e3d" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#orb)"/>
  <!-- Border frame -->
  <rect x="40" y="40" width="1120" height="550" rx="16" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <!-- VDS badge -->
  <rect x="80" y="80" width="72" height="36" rx="6" fill="#1a3a6b"/>
  <text x="116" y="103" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">VDS</text>
  <!-- Main headline -->
  <text x="80" y="260" font-family="system-ui,sans-serif" font-size="68" font-weight="800" fill="white" letter-spacing="-2">Value Driven</text>
  <text x="80" y="345" font-family="system-ui,sans-serif" font-size="68" font-weight="800" fill="rgba(255,255,255,0.45)" letter-spacing="-2">Solutions</text>
  <!-- Divider line -->
  <rect x="80" y="378" width="56" height="3" rx="2" fill="#2451a0"/>
  <!-- Tagline -->
  <text x="80" y="430" font-family="system-ui,sans-serif" font-size="26" fill="rgba(255,255,255,0.65)">Soluciones tecnologicas para Centro America</text>
  <!-- Service tags -->
  <rect x="80" y="480" width="180" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="170" y="503" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">Nube y M365</text>
  <rect x="276" y="480" width="180" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="366" y="503" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">Ciberseguridad</text>
  <rect x="472" y="480" width="180" height="36" rx="18" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="562" y="503" font-family="system-ui,sans-serif" font-size="14" fill="rgba(255,255,255,0.6)" text-anchor="middle">Soporte 24/7</text>
  <!-- Domain -->
  <text x="1120" y="560" font-family="system-ui,sans-serif" font-size="18" fill="rgba(255,255,255,0.3)" text-anchor="end">vdstecnologia.com</text>
</svg>
