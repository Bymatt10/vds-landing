server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache hashed static assets (Astro adds content hashes to _astro/* files)
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # No-cache for HTML pages so updates are picked up immediately
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Cache public assets (logos, favicons, etc.)
    location ~* \.(svg|png|jpg|jpeg|webp|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # Route all requests — serves file, then directory, then 404 page
    location / {
        try_files $uri $uri/ /404.html;
    }
}
