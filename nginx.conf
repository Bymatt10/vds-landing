server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache hashed static assets (_astro/* files have content hashes)
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Cache public assets
    location ~* \.(svg|png|jpg|jpeg|webp|ico|woff|woff2)$ {
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # No-cache for HTML
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Redirect trailing slash → no trailing slash (matches Astro trailingSlash: 'never')
    rewrite ^/(.*)/$ /$1 permanent;

    # Route all requests: file → file.html → 404
    location / {
        try_files $uri $uri.html $uri/index.html /404.html;
    }
}
